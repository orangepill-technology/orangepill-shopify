version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: shopify
      POSTGRES_PASSWORD: shopify123
      POSTGRES_DB: shopify_app
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U shopify']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
